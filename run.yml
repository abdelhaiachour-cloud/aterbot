name: Bot Runner
on:
  workflow_dispatch: # هذا يضيف لك زر "تشغيل" يدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: node index.js # تأكد أن الملف الأساسي في المستودع اسمه index.js
